<script>
    let uploadedFileData = "";

    function goToStep(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        window.scrollTo(0,0);
    }

    function validateAndNext(current, next) {
        const activeStep = document.getElementById('step' + current);
        const inputs = activeStep.querySelectorAll('input[required], select[required]');
        let valid = true;
        inputs.forEach(i => { if(!i.checkValidity()) { i.reportValidity(); valid = false; } });
        if(valid) goToStep(next);
    }

    function toggleMajor() {
        const grade = document.getElementById('grade').value;
        document.getElementById('major_box').style.display = (grade === 'י') ? 'block' : 'none';
    }

    function handleFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) { 
            uploadedFileData = e.target.result; 
            document.getElementById('preview-img').src = uploadedFileData;
        }
        if(file) reader.readAsDataURL(file);
    }

    function generateSummary() {
        if(!document.getElementById('file_input').files[0]) {
            alert("נא לצרף צילום ספח תעודת זהות לפני הסיום");
            return;
        }
        
        document.getElementById('sum_p_name').innerText = document.getElementById('p_role').value + ": " + document.getElementById('p_first').value + " " + document.getElementById('p_last').value;
        document.getElementById('sum_p_id').innerText = document.getElementById('p_id_val').value;
        document.getElementById('sum_s_name').innerText = document.getElementById('s_first').value + " " + document.getElementById('s_father').value + " " + document.getElementById('s_last_s').value;
        document.getElementById('sum_s_id').innerText = document.getElementById('s_id_val').value;
        document.getElementById('sum_s_dob').innerText = document.getElementById('s_dob').value;
        
        const g = document.getElementById('grade').value;
        const m = (g === 'י') ? " (מגמת " + document.getElementById('major').value + ")" : "";
        document.getElementById('sum_grade').innerText = "שכבה " + g + m;

        document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
        document.getElementById('success-msg').style.display = 'block';
        // שליחת הנתונים ל-Google Sheets של Ali Dallasheh Systems
   const formData = {
            p_role: document.getElementById('p_role').value,
            p_name: document.getElementById('p_first').value + " " + document.getElementById('p_last').value,
            p_id: document.getElementById('p_id_val').value,
            s_name: document.getElementById('s_first').value + " " + document.getElementById('s_father').value + " " + document.getElementById('s_last_s').value,
            s_id: document.getElementById('s_id_val').value,
            s_dob: document.getElementById('s_dob').value,
            grade_major: document.getElementById('sum_grade').innerText,
            // זו השורה החדשה והחשובה:
            id_photo: uploadedFileData 
        };
        

        fetch('https://script.google.com/macros/s/AKfycbzK-bJxYRzk9DWS903oFNThDgbFV55a3TEy7dCRHfh1oJt5ML7W0O3AdRZQkEKP2F8_/exec', {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(formData)
        }).then(() => {
            console.log("הנתונים נשלחו לטבלה");
        });
        window.scrollTo(0,0);
    }
</script>
